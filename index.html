<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Studio</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 50px; }
        #result { margin-top: 20px; min-height: 300px; border: 2px dashed #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { max-width: 100%; height: auto; display: block; }
        input { padding: 12px; width: 300px; border-radius: 5px; border: none; outline: none; }
        button { padding: 12px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        .status-msg { color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

    <h1>AI Image Studio</h1>
    <p>Generate high-quality images for free</p>
    
    <input type="text" id="promptInput" placeholder="A futuristic city in the clouds...">
    <button id="genBtn">Generate Image</button>

    <div id="result">
        <p id="status">Your image will appear here</p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
