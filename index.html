<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Studio 2026</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 50px; }
        #result { margin-top: 20px; min-height: 300px; border: 2px dashed #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; border-radius: 10px; }
        input { padding: 12px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 12px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .loading { color: #aaa; font-style: italic; }
    </style>
</head>
<body>

    <h1>AI Image Studio</h1>
    <input type="text" id="promptInput" placeholder="A neon jellyfish in deep space...">
    <button id="genBtn">Generate</button>

    <div id="result">
        <p id="status">Ready to generate...</p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
